{% extends "base.html" %}
{% block title %}Sign Up — QuizMind{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 65px);
    padding: 2rem 1rem;
  }
  .auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 2.5rem 2.5rem 2rem;
    box-shadow: 7px 7px 0 var(--ink);
    animation: pop .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop {
    from { opacity:0; transform:translateY(20px) scale(.97); }
    to   { opacity:1; transform:none; }
  }
  .auth-tag {
    font-family: 'Syne', sans-serif;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .5rem;
  }
  .hint { font-size:.78rem; color:var(--muted); margin-top:.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-tag">Create Account</div>
    <h2>Get started</h2>
    <p class="text-muted mt-1">Create your free student account in seconds.</p>

    <hr class="divider">

    <form method="POST">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required />
        <div class="hint">Must be at least 6 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">
        Create Account →
      </button>
    </form>

    <p class="text-center text-muted mt-3">
      Already have an account? <a href="/login" style="color:var(--ink);font-weight:600;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
